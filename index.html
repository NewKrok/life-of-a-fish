<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <title>Life of a Fish</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #040a14;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #gameCanvas {
      display: block;
      width: 100%; height: 100%;
    }
    /* HUD overlay canvas for text/icons */
    #hudCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* ── Touch Controls ── */
    .touch-controls {
      display: none;
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 200px;
      pointer-events: none;
    }
    @media (hover: none) and (pointer: coarse) {
      .touch-controls { display: block; }
    }
    .joystick-zone {
      position: absolute;
      left: 20px; bottom: 20px;
      width: 140px; height: 140px;
      pointer-events: auto;
    }
    .joystick-outer {
      width: 140px; height: 140px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      position: relative;
    }
    .joystick-inner {
      width: 50px; height: 50px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      border: 2px solid rgba(255,255,255,0.4);
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      transition: none;
    }
    .dash-btn {
      position: absolute;
      right: 30px; bottom: 40px;
      width: 70px; height: 70px;
      border-radius: 50%;
      background: rgba(255,140,66,0.2);
      border: 2px solid rgba(255,140,66,0.5);
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.6);
      font: bold 10px 'Silkscreen', monospace;
    }
    .dash-btn:active, .dash-btn.active {
      background: rgba(255,140,66,0.5);
    }

    /* ── Main Menu Overlay ── */
    #menuOverlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }
    #menuOverlay.hidden { display: none; }

    .menu-title {
      font-family: 'Silkscreen', monospace;
      font-size: 48px;
      font-weight: bold;
      color: #ffd93d;
      text-shadow:
        0 0 20px rgba(255, 217, 61, 0.4),
        0 2px 4px rgba(0, 0, 0, 0.6),
        0 4px 12px rgba(0, 0, 0, 0.3);
      letter-spacing: 3px;
      margin-bottom: 48px;
      pointer-events: none;
    }

    .menu-items {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      pointer-events: auto;
    }

    .menu-btn {
      background: rgba(10, 40, 70, 0.7);
      border: 2px solid rgba(100, 180, 255, 0.3);
      border-radius: 8px;
      padding: 14px 48px;
      min-width: 240px;
      color: #c8e6ff;
      font: bold 13px 'Silkscreen', monospace;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s ease;
      letter-spacing: 1px;
    }
    .menu-btn:hover {
      background: rgba(20, 60, 100, 0.85);
      border-color: rgba(100, 200, 255, 0.6);
      color: #ffffff;
      transform: scale(1.04);
    }
    .menu-btn:active {
      transform: scale(0.97);
    }

    /* ── Aquarium Close Button ── */
    #aquariumClose {
      position: absolute;
      top: 20px; right: 20px;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(10, 30, 60, 0.7);
      border: 2px solid rgba(100, 180, 255, 0.4);
      color: #c8e6ff;
      font: bold 20px 'Silkscreen', monospace;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 20;
      transition: all 0.2s ease;
    }
    #aquariumClose:hover {
      background: rgba(20, 50, 90, 0.9);
      border-color: rgba(100, 200, 255, 0.7);
      color: #ffffff;
    }
    #aquariumClose.visible { display: flex; }

    /* ── Settings / About Panels ── */
    .menu-panel {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 15;
      pointer-events: none;
    }
    .menu-panel.visible {
      display: flex;
    }
    .panel-box {
      background: rgba(6, 21, 32, 0.92);
      border: 2px solid rgba(100, 180, 255, 0.3);
      border-radius: 12px;
      padding: 32px 48px;
      min-width: 320px;
      max-width: 440px;
      text-align: center;
      pointer-events: auto;
    }
    .panel-title {
      font: bold 22px 'Silkscreen', monospace;
      color: #ffd93d;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }
    .panel-text {
      font: 11px 'Silkscreen', monospace;
      color: rgba(200, 230, 255, 0.7);
      line-height: 1.8;
      margin-bottom: 24px;
    }
    .panel-back-btn {
      background: rgba(10, 40, 70, 0.7);
      border: 2px solid rgba(100, 180, 255, 0.3);
      border-radius: 8px;
      padding: 10px 32px;
      color: #c8e6ff;
      font: bold 11px 'Silkscreen', monospace;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .panel-back-btn:hover {
      background: rgba(20, 60, 100, 0.85);
      border-color: rgba(100, 200, 255, 0.6);
      color: #ffffff;
    }
    .panel-text a:hover {
      color: #a0d4ff;
      text-decoration: underline;
    }

    /* ── Settings controls ── */
    .settings-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding: 0 8px;
    }
    .settings-label {
      font: bold 11px 'Silkscreen', monospace;
      color: rgba(200, 230, 255, 0.8);
      min-width: 60px;
      text-align: left;
    }
    .settings-value {
      font: 11px 'Silkscreen', monospace;
      color: rgba(200, 230, 255, 0.6);
      min-width: 36px;
      text-align: right;
    }
    .settings-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: rgba(100, 180, 255, 0.15);
      outline: none;
    }
    .settings-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #64b4ff;
      border: 2px solid rgba(200, 230, 255, 0.5);
      cursor: pointer;
    }
    .settings-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #64b4ff;
      border: 2px solid rgba(200, 230, 255, 0.5);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <canvas id="hudCanvas"></canvas>

  <!-- Touch controls (shown only on mobile via CSS) -->
  <div class="touch-controls">
    <div class="joystick-zone" id="joystickZone">
      <div class="joystick-outer">
        <div class="joystick-inner" id="joystickInner"></div>
      </div>
    </div>
    <div class="dash-btn" id="dashBtn">DASH</div>
  </div>

  <!-- Main Menu Overlay -->
  <div id="menuOverlay">
    <div class="menu-title">Life of a Fish</div>
    <div class="menu-items">
      <button class="menu-btn" id="btnStartGame">Start Game</button>
      <button class="menu-btn" id="btnAquarium">Aquarium</button>
      <button class="menu-btn" id="btnSettings">Settings</button>
      <button class="menu-btn" id="btnAbout">About</button>
    </div>
  </div>

  <!-- Aquarium close button -->
  <button id="aquariumClose">&times;</button>

  <!-- Settings Panel -->
  <div class="menu-panel" id="settingsPanel">
    <div class="panel-box">
      <div class="panel-title">Settings</div>
      <div class="settings-row">
        <label class="settings-label" for="musicVolume">Music</label>
        <input type="range" id="musicVolume" class="settings-slider" min="0" max="100" value="60">
        <span class="settings-value" id="musicVolumeVal">60%</span>
      </div>
      <div class="settings-row">
        <label class="settings-label" for="sfxVolume">SFX</label>
        <input type="range" id="sfxVolume" class="settings-slider" min="0" max="100" value="40">
        <span class="settings-value" id="sfxVolumeVal">40%</span>
      </div>
      <button class="panel-back-btn" id="settingsBack">Back</button>
    </div>
  </div>

  <!-- About Panel -->
  <div class="menu-panel" id="aboutPanel">
    <div class="panel-box">
      <div class="panel-title">About</div>
      <div class="panel-text">
        Life of a Fish<br>
        An underwater platformer<br><br>
        Built with Three.js &amp; Nape-JS<br>
        100% Claude Code project<br><br>
        Created for the<br>
        THREE.JS Water Pro giveaway<br><br>
        by Krisztian Somoracz<br><br>
        <a href="https://github.com/NewKrok/life-of-a-fish" target="_blank" style="color:#64b4ff;text-decoration:none;">GitHub</a>
        &nbsp;&middot;&nbsp;
        <a href="https://x.com/KSomoracz" target="_blank" style="color:#64b4ff;text-decoration:none;">X / Twitter</a>
      </div>
      <button class="panel-back-btn" id="aboutBack">Back</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
  <script>
    // Volume settings with localStorage persistence
    const STORAGE_KEY = 'loaf_settings';
    const defaults = { musicVol: 60, sfxVol: 40 };

    function loadSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (saved) return { ...defaults, ...saved };
      } catch (_) {}
      return defaults;
    }

    function saveSettings(s) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (_) {}
    }

    const settings = loadSettings();
    const musicSlider = document.getElementById('musicVolume');
    const musicLabel = document.getElementById('musicVolumeVal');
    const sfxSlider = document.getElementById('sfxVolume');
    const sfxLabel = document.getElementById('sfxVolumeVal');

    // Apply saved values to sliders and audio systems
    musicSlider.value = settings.musicVol;
    musicLabel.textContent = settings.musicVol + '%';
    sfxSlider.value = settings.sfxVol;
    sfxLabel.textContent = settings.sfxVol + '%';

    // Apply to audio systems once they exist
    function applySavedVolumes() {
      if (window._music) window._music.setVolume(settings.musicVol / 100);
      if (window._sfx) window._sfx.setVolume(settings.sfxVol / 100);
    }
    // Retry until audio systems are ready (module loads async)
    const _volInterval = setInterval(() => {
      if (window._music && window._sfx) { applySavedVolumes(); clearInterval(_volInterval); }
    }, 100);

    musicSlider.addEventListener('input', () => {
      const v = parseInt(musicSlider.value);
      musicLabel.textContent = v + '%';
      settings.musicVol = v;
      saveSettings(settings);
      if (window._music) window._music.setVolume(v / 100);
    });

    sfxSlider.addEventListener('input', () => {
      const v = parseInt(sfxSlider.value);
      sfxLabel.textContent = v + '%';
      settings.sfxVol = v;
      saveSettings(settings);
      if (window._sfx) window._sfx.setVolume(v / 100);
    });
  </script>
</body>
</html>
